<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Image Gallery</h1>

    <div class="gallery">

        <img src="images/img1.jpg" onclick="openLightbox(0)">
        <img src="images/img2.jpg" onclick="openLightbox(1)">
        <img src="images/img3.jpg" onclick="openLightbox(2)">
        <img src="images/img4.jpg" onclick="openLightbox(3)">
        <img src="images/img5.jpg" onclick="openLightbox(4)">
        <img src="images/img6.jpg" onclick="openLightbox(5)">
        <img src="images/img7.jpg" onclick="openLightbox(0)">
        <img src="images/img8.jpg" onclick="openLightbox(1)">
        <img src="images/img9.jpg" onclick="openLightbox(2)">
        <img src="images/img10.jpg" onclick="openLightbox(3)">
        <img src="images/img11.jpg" onclick="openLightbox(4)">
        <img src="images/img12.jpg" onclick="openLightbox(5)">
        <img src="images/img13.jpg" onclick="openLightbox(5)">
        <img src="images/img14.jpg" onclick="openLightbox(0)">
        <img src="images/img15.jpg" onclick="openLightbox(1)">
        <img src="images/img16.jpg" onclick="openLightbox(2)">
        <img src="images/img17.jpg" onclick="openLightbox(3)">

    </div>

    <!-- Lightbox -->

    <div class="lightbox" id="lightbox">

        <span class="close" onclick="closeLightbox()">×</span>

        <button class="prev" onclick="changeSlide(-1)">❮</button>

        <img id="lightbox-img">

        <button class="next" onclick="changeSlide(1)">❯</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
